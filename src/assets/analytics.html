<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FairSplit - Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding: 0; margin: 0; min-height: 100vh; background: #070b14; padding-bottom: 40px; }

    .header {
      background: rgba(7,11,20,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }

    .back-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #f0f4ff;
      font-size: 16px; width: 36px; height: 36px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .header h2 { font-size: 18px; font-weight: 700; color: #f0f4ff; }
    .content { padding: 20px; }

    .stat-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 24px;
    }

    .stat-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 18px; text-align: center;
    }

    .stat-card .si { font-size: 28px; margin-bottom: 8px; }
    .stat-card .sv { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .stat-card .sl { font-size: 11px; color: #4a5568; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .chart-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
    }

    .chart-card h3 { font-size: 15px; font-weight: 700; color: #f0f4ff; margin-bottom: 16px; }

    .chart-wrapper { position: relative; height: 200px; }

    .group-stat-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .group-stat-item:last-child { border-bottom: none; }

    .gsi-left { display: flex; align-items: center; gap: 12px; }
    .gsi-icon {
      width: 40px; height: 40px;
      background: rgba(0,200,150,0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .gsi-name { font-size: 14px; font-weight: 600; color: #f0f4ff; }
    .gsi-members { font-size: 12px; color: #4a5568; font-weight: 500; margin-top: 2px; }
    .gsi-amount { font-size: 15px; font-weight: 700; color: #00c896; }

    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { color: #4a5568; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='/assets/dashboard.html'">←</button>
    <h2>📊 Analytics</h2>
  </div>

  <div class="content">

    <!-- Stats Grid -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="si">👥</div>
        <div class="sv" style="color:#00c896;" id="stat-groups">0</div>
        <div class="sl">Total Groups</div>
      </div>
      <div class="stat-card">
        <div class="si">💸</div>
        <div class="sv" style="color:#3b82f6;" id="stat-expenses">0</div>
        <div class="sl">Total Expenses</div>
      </div>
      <div class="stat-card">
        <div class="si">💰</div>
        <div class="sv" style="color:#f59e0b;" id="stat-amount">₹0</div>
        <div class="sl">Total Spent</div>
      </div>
      <div class="stat-card">
        <div class="si">✅</div>
        <div class="sv" style="color:#10d98a;" id="stat-settled">₹0</div>
        <div class="sl">You Get Back</div>
      </div>
    </div>

    <!-- Spending Chart -->
    <div class="chart-card">
      <h3>💳 Spending by Group</h3>
      <div class="chart-wrapper">
        <canvas id="spendingChart"></canvas>
      </div>
    </div>

    <!-- Split Type Chart -->
    <div class="chart-card">
      <h3>⚖️ Split Types Used</h3>
      <div class="chart-wrapper">
        <canvas id="splitChart"></canvas>
      </div>
    </div>

    <!-- Groups List -->
    <div class="chart-card">
      <h3>🏠 Group Summary</h3>
      <div id="groups-summary">
        <div class="empty-state">
          <div class="icon">📊</div>
          <p>Loading analytics...</p>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/assets/js/firebase-config.js"></script>
  <script type="module" src="/assets/js/analytics.js"></script>
</body>
</html>
