<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FairSplit - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <style>
    body { padding: 0; margin: 0; min-height: 100vh; background: #070b14; }

    .header {
      background: rgba(7,11,20,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }

    .back-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #f0f4ff;
      font-size: 16px; width: 36px; height: 36px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .header h2 { font-size: 18px; font-weight: 700; color: #f0f4ff; }
    .content { padding: 20px; padding-bottom: 40px; }

    .profile-hero {
      text-align: center; padding: 32px 20px;
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px; margin-bottom: 20px;
    }

    .profile-avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #00c896, #00a87d);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: #070b14;
      margin: 0 auto 16px;
      box-shadow: 0 0 30px rgba(0,200,150,0.3);
    }

    .profile-name { font-size: 22px; font-weight: 700; color: #f0f4ff; margin-bottom: 4px; }
    .profile-email { font-size: 14px; color: #4a5568; font-weight: 500; margin-bottom: 16px; }

    .profile-badge {
      display: inline-block;
      background: rgba(0,200,150,0.1);
      border: 1px solid rgba(0,200,150,0.2);
      border-radius: 20px; padding: 6px 16px;
      font-size: 12px; font-weight: 600; color: #00c896;
    }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 20px;
    }

    .stat-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 16px; text-align: center;
    }

    .stat-card .sv { font-size: 20px; font-weight: 700; color: #00c896; margin-bottom: 4px; }
    .stat-card .sl { font-size: 10px; color: #4a5568; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .menu-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; overflow: hidden; margin-bottom: 16px;
    }

    .menu-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: all 0.25s;
    }

    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: rgba(0,200,150,0.05); }

    .menu-left { display: flex; align-items: center; gap: 12px; }
    .menu-icon {
      width: 36px; height: 36px;
      background: rgba(0,200,150,0.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .menu-text { font-size: 14px; font-weight: 600; color: #f0f4ff; }
    .menu-sub { font-size: 12px; color: #4a5568; font-weight: 500; margin-top: 2px; }
    .menu-arrow { color: #4a5568; font-size: 14px; }

    .logout-btn {
      width: 100%; padding: 15px;
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: 14px; color: #f43f5e;
      font-size: 15px; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.25s;
    }

    .logout-btn:hover { background: rgba(244,63,94,0.15); }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='/assets/dashboard.html'">←</button>
    <h2>👤 Profile</h2>
  </div>

  <div class="content">

    <div class="profile-hero">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-email" id="profile-email">...</div>
      <div class="profile-badge">✅ Verified Account</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="sv" id="p-groups">0</div>
        <div class="sl">Groups</div>
      </div>
      <div class="stat-card">
        <div class="sv" id="p-expenses">0</div>
        <div class="sl">Expenses</div>
      </div>
      <div class="stat-card">
        <div class="sv" id="p-amount">₹0</div>
        <div class="sl">Total Spent</div>
      </div>
    </div>

    <div class="menu-card">
      <div class="menu-item">
        <div class="menu-left">
          <div class="menu-icon">👤</div>
          <div>
            <div class="menu-text">Account Info</div>
            <div class="menu-sub" id="menu-email">...</div>
          </div>
        </div>
        <div class="menu-arrow">→</div>
      </div>
      <div class="menu-item" onclick="window.location.href='/assets/analytics.html'">
        <div class="menu-left">
          <div class="menu-icon">📊</div>
          <div>
            <div class="menu-text">Analytics</div>
            <div class="menu-sub">View spending insights</div>
          </div>
        </div>
        <div class="menu-arrow">→</div>
      </div>
      <div class="menu-item" onclick="window.location.href='/assets/dashboard.html'">
        <div class="menu-left">
          <div class="menu-icon">👥</div>
          <div>
            <div class="menu-text">My Groups</div>
            <div class="menu-sub">View all your groups</div>
          </div>
        </div>
        <div class="menu-arrow">→</div>
      </div>
    </div>

    <button class="logout-btn" id="logout-btn">🚪 Logout</button>

  </div>

  <script type="module" src="/assets/js/firebase-config.js"></script>
  <script type="module" src="/assets/js/profile.js"></script>
</body>
</html>
